<section class="contact-section">


    <h1>Liên Hệ</h1>

    <form id="contactForm">

        <input type="text" id="name" placeholder="Họ tên" required>

        <input type="email" id="email" placeholder="Email" required>

        <input type="text" id="subject" placeholder="Chủ đề" required>

        <textarea id="message" placeholder="Nội dung" required></textarea>

        <button type="submit">Gửi Tin Nhắn</button>

    </form>

    <!-- Box hiển thị thông tin -->
    <div id="resultBox" class="result-box">
        <h3>Xác nhận thông tin</h3>

        <p><b>Họ tên:</b> <span id="showName"></span></p>

        <p><b>Email:</b> <span id="showEmail"></span></p>

        <p><b>Chủ đề:</b> <span id="showSubject"></span></p>

        <p><b>Nội dung:</b> <span id="showMessage"></span></p>

        <button onclick="saveData()">Đồng ý</button>
    </div>
</section>
